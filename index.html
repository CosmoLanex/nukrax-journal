<!DOCTYPE html>
<html>
<head>
  <title>Nukrax Journal V3</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#0b0b0b; color:#fff; font-family:Arial; padding:20px;}
    .card { background:#1a1a1a; padding:20px; border-radius:12px; margin-bottom:20px;}
    input, select, textarea { width:100%; margin:5px 0; padding:8px; background:#222; color:#fff; border:none;}
    button { padding:10px; background:#444; color:#fff; border:none; cursor:pointer; margin-top:10px;}
    .win { border-left:5px solid green; }
    .loss { border-left:5px solid red; }
    .stats { display:flex; flex-wrap:wrap; gap:10px;}
    .stat { background:#222; padding:10px; border-radius:8px;}
    img { max-width:100%; margin-top:10px; border-radius:8px;}
  </style>
</head>
<body>

<h1>Nukrax Trading Journal V3</h1>

<div class="card stats">
  <div class="stat">Total: <span id="total">0</span></div>
  <div class="stat">Wins: <span id="wins">0</span></div>
  <div class="stat">Losses: <span id="losses">0</span></div>
  <div class="stat">WR: <span id="wr">0%</span></div>
  <div class="stat">Profit: <span id="profit">0</span></div>
  <div class="stat">A+ WR: <span id="awr">0%</span></div>
</div>

<div class="card">
<h3>Add Trade</h3>

<select id="type"><option>Buy</option><option>Sell</option></select>
<select id="tf"><option>5m</option><option>15m</option><option>30m</option><option>1H</option></select>
<select id="session"><option>London</option><option>New York</option><option>Asia</option></select>

<input id="rr" placeholder="RR (e.g. 2)">
<select id="result"><option>Win</option><option>Loss</option></select>

<label><input type="checkbox" id="aplus"> A+ Setup</label>

<h4>Checklist</h4>
<label><input type="checkbox" class="chk"> HTF Bias</label><br>
<label><input type="checkbox" class="chk"> Liquidity Sweep</label><br>
<label><input type="checkbox" class="chk"> BOS</label><br>
<label><input type="checkbox" class="chk"> FVG</label><br>
<label><input type="checkbox" class="chk"> Session Valid</label><br>
<label><input type="checkbox" class="chk"> Entry Confirm</label><br>

<p id="warn" style="color:red;"></p>

<textarea id="note" placeholder="Reflection..."></textarea>
<input type="file" id="img">

<button onclick="saveTrade()">Save Trade</button>
</div>

<div class="card">
<h3>Charts</h3>
<canvas id="equity"></canvas>
<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>Trades</h3>
<div id="list"></div>
</div>

<script>
let equityChart, pieChart;

function getTrades(){
  return JSON.parse(localStorage.getItem("trades")||"[]")
}

function saveTrade(){
  let checks = document.querySelectorAll(".chk");
  let allChecked = [...checks].every(c=>c.checked);

  if(!allChecked){
    warn.innerText="Rules not satisfied";
    return;
  }

  if(session.value=="Asia"){
    warn.innerText="Avoid Asia session";
    return;
  }

  let file = img.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    let trade = {
      type:type.value,
      tf:tf.value,
      session:session.value,
      rr:parseFloat(rr.value)||1,
      result:result.value,
      note:note.value,
      aplus:aplus.checked,
      img:reader.result,
      date:new Date().toLocaleString()
    };

    let trades = getTrades();
    trades.unshift(trade);
    localStorage.setItem("trades", JSON.stringify(trades));

    render();
  };

  if(file) reader.readAsDataURL(file);
  else reader.onload();
}

function calcStats(trades){
  let wins = trades.filter(t=>t.result=="Win");
  let losses = trades.filter(t=>t.result=="Loss");

  let profit = trades.reduce((p,t)=> p + (t.result=="Win"?t.rr:-1),0);

  let aplus = trades.filter(t=>t.aplus);
  let aWins = aplus.filter(t=>t.result=="Win").length;

  total.innerText=trades.length;
  winsEl.innerText=wins.length;
  lossesEl.innerText=losses.length;
  wr.innerText= trades.length?((wins.length/trades.length)*100).toFixed(1):0;
  profitEl.innerText=profit;
  awr.innerText= aplus.length?((aWins/aplus.length)*100).toFixed(1):0;
}

function render(){
  let trades = getTrades();

  calcStats(trades);

  let html="";
  trades.forEach((t,i)=>{
    html+=`
    <div class="${t.result=='Win'?'win':'loss'} card">
      ${t.type} | ${t.tf} | ${t.session} | RR:${t.rr} | ${t.result}
      <br>${t.date}
      <br>${t.note}
      ${t.img?`<img src="${t.img}">`:""}
      <br>
      <button onclick="del(${i})">Delete</button>
    </div>`;
  });

  list.innerHTML=html;

  drawCharts(trades);
}

function del(i){
  let trades=getTrades();
  trades.splice(i,1);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function drawCharts(trades){
  let equity=[];
  let sum=0;

  trades.slice().reverse().forEach(t=>{
    sum += (t.result=="Win"?t.rr:-1);
    equity.push(sum);
  });

  if(equityChart) equityChart.destroy();
  equityChart=new Chart(document.getElementById("equity"),{
    type:"line",
    data:{labels:equity.map((_,i)=>i+1), datasets:[{data:equity}]}
  });

  let wins=trades.filter(t=>t.result=="Win").length;
  let losses=trades.filter(t=>t.result=="Loss").length;

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{labels:["Wins","Losses"], datasets:[{data:[wins,losses]}]}
  });
}

let total=document.getElementById("total");
let winsEl=document.getElementById("wins");
let lossesEl=document.getElementById("losses");
let wr=document.getElementById("wr");
let profitEl=document.getElementById("profit");
let awr=document.getElementById("awr");

render();
</script>

</body>
</html>
