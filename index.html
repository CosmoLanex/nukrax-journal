<!DOCTYPE html>
<html>
<head>
  <title>Nukrax Journal V3</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#0b0b0b; color:#fff; font-family:Arial; padding:20px;}
    .card { background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:20px;}
    input, select, textarea { width:100%; margin:5px 0; padding:8px; background:#222; color:#fff; border:none;}
    button { padding:8px; margin-top:5px; background:#444; color:#fff; border:none; cursor:pointer;}
    .win { border-left:5px solid green;}
    .loss { border-left:5px solid red;}
    .stats { display:flex; flex-wrap:wrap; gap:10px;}
    .stat { background:#222; padding:10px; border-radius:8px; min-width:120px;}
    img { max-width:100%; margin-top:10px; border-radius:8px;}
  </style>
</head>

<body>

<h1>Nukrax Journal V3</h1>

<div class="card stats">
  <div class="stat">Total: <span id="total"></span></div>
  <div class="stat">Win Rate: <span id="wr"></span></div>
  <div class="stat">Profit: <span id="profit"></span></div>
  <div class="stat">A+ WR: <span id="aplus"></span></div>
</div>

<div class="card">
<h3>Add Trade</h3>

<select id="type"><option>Buy</option><option>Sell</option></select>
<select id="tf"><option>5m</option><option>15m</option><option>30m</option><option>1H</option></select>
<select id="session" onchange="sessionWarn()">
<option>London</option>
<option>New York</option>
<option>Asia</option>
</select>

<input id="rr" placeholder="RR (e.g 2)">
<select id="result"><option>Win</option><option>Loss</option></select>

<label><input type="checkbox" id="aplusBox"> A+ Setup</label>

<h4>Checklist</h4>
<label><input type="checkbox" class="chk"> HTF Bias</label><br>
<label><input type="checkbox" class="chk"> Liquidity Sweep</label><br>
<label><input type="checkbox" class="chk"> BOS</label><br>
<label><input type="checkbox" class="chk"> FVG</label><br>
<label><input type="checkbox" class="chk"> Session Valid</label><br>
<label><input type="checkbox" class="chk"> Entry Confirm</label><br>

<p id="warn" style="color:red;"></p>

<textarea id="note" placeholder="Reflection..."></textarea>
<input type="file" id="imgInput">

<button onclick="saveTrade()">Save Trade</button>

</div>

<div class="card">
<h3>Charts</h3>
<canvas id="equity"></canvas>
<canvas id="pie"></canvas>
</div>

<div class="card">
<h3>Trades</h3>
<div id="list"></div>
</div>

<script>
function getTrades(){
  return JSON.parse(localStorage.getItem("trades")||"[]")
}

function sessionWarn(){
  if(session.value==="Asia"){
    warn.innerText="⚠ Avoid Asia session (low probability)";
  } else warn.innerText="";
}

function saveTrade(){
  let checks = document.querySelectorAll(".chk");
  if(![...checks].every(c=>c.checked)){
    warn.innerText="Rules not satisfied";
    return;
  }

  let reader = new FileReader();
  let file = imgInput.files[0];

  reader.onload = function(){
    let trade = {
      type:type.value,
      tf:tf.value,
      session:session.value,
      rr:parseFloat(rr.value||1),
      result:result.value,
      note:note.value,
      aplus:aplusBox.checked,
      img: reader.result,
      date:new Date().toLocaleString()
    };

    let trades=getTrades();
    trades.unshift(trade);
    localStorage.setItem("trades",JSON.stringify(trades));

    render();
  };

  if(file) reader.readAsDataURL(file);
  else reader.onload();
}

function calcStats(trades){
  let wins=trades.filter(t=>t.result==="Win");
  let profit=0;

  trades.forEach(t=>{
    profit += t.result==="Win" ? t.rr : -1;
  });

  let aplus=trades.filter(t=>t.aplus);
  let aplusWR = aplus.length ? (aplus.filter(t=>t.result==="Win").length/aplus.length*100).toFixed(1) : 0;

  total.innerText=trades.length;
  wr.innerText= trades.length ? (wins.length/trades.length*100).toFixed(1)+"%" : "0%";
  profit.innerText=profit;
  document.getElementById("aplus").innerText=aplusWR+"%";
}

function render(){
  let trades=getTrades();
  calcStats(trades);

  let html="";
  trades.forEach((t,i)=>{
    html+=`
    <div class="card ${t.result==='Win'?'win':'loss'}">
      ${t.type} | ${t.tf} | ${t.session} | RR:${t.rr} | ${t.result}
      <br>${t.date}
      <br>${t.aplus?"A+ Trade":""}
      <br>${t.note}
      ${t.img?`<img src="${t.img}">`:""}
      <br>
      <button onclick="del(${i})">Delete</button>
    </div>`;
  });

  list.innerHTML=html;
  updateCharts(trades);
}

function del(i){
  let trades=getTrades();
  trades.splice(i,1);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function updateCharts(trades){
  let equity=[];
  let total=0;

  trades.slice().reverse().forEach(t=>{
    total += t.result==="Win"?t.rr:-1;
    equity.push(total);
  });

  new Chart(document.getElementById("equity"),{
    type:"line",
    data:{labels:equity.map((_,i)=>i+1),datasets:[{data:equity}]}
  });

  let wins=trades.filter(t=>t.result==="Win").length;
  let losses=trades.length-wins;

  new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{labels:["Win","Loss"],datasets:[{data:[wins,losses]}]}
  });
}

render();
</script>

</body>
</html>
